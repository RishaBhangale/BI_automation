# ──────────────────────────────────────────────────────────────────────────────
# KPI Validations
#
# Titles are EXACT matches from live DOM discovery (2026-07-10).
# Sub-KPIs (e.g. "First artist(s)_name") live inside a multi-value Card visual
# and are extracted via Pass 2 of _extract_card_value_ptw (sub-KPI line search).
#
# INTENTIONAL MISMATCHES (designed to generate FAIL rows in report):
#   - "First artist(s)_name": expected The Beatles, dashboard shows The Weeknd → FAIL
# ──────────────────────────────────────────────────────────────────────────────
kpi_validations:

  # ── Standalone Card visuals ─────────────────────────────────────────────────
  - visual_title:   "Average Stream per Year"
    page:           ""
    expected_value: 514140000    # Dashboard displays "514.14M"
    is_text:        false
    tolerance:      0.02         # 2% — formatted value loses precision

  - visual_title:   "Top Song Vs Average"
    page:           ""
    expected_value: 999.0        # INTENTIONAL MISMATCH — dashboard shows 620.4% → demonstrates FAIL in report
    is_text:        false
    tolerance:      0.01

  # ── Multi-value Card: "First track_name" ───────────────────────────────────
  # This Card renders multiple KPIs: track name + artist name
  - visual_title:   "First track_name"
    page:           ""
    expected_value: "Blinding Lights"
    is_text:        true
    tolerance:      0.01

  - visual_title:   "First artist(s)_name"
    page:           ""
    expected_value: "The Weeknd"   # Correct expected value — dashboard shows "The Weeknd" → PASS
    is_text:        true
    tolerance:      0.01

  # ── Multi-value Card: "Sum of acousticness_%" ───────────────────────────────
  # This Card renders 4 KPIs: acousticness, danceability, liveness, speechiness
  - visual_title:   "Sum of acousticness_%"
    page:           ""
    expected_value: 0            # Dashboard displays "0"
    is_text:        false
    tolerance:      0.01

  - visual_title:   "Sum of danceability_%"
    page:           ""
    expected_value: 50           # Dashboard displays "50"
    is_text:        false
    tolerance:      0.01

  - visual_title:   "Sum of liveness_%"
    page:           ""
    expected_value: 9            # Dashboard displays "9" (approximate — update after first run)
    is_text:        false
    tolerance:      0.01

  - visual_title:   "Sum of speechiness_%"
    page:           ""
    expected_value: 7            # Dashboard displays "7" (approximate — update after first run)
    is_text:        false
    tolerance:      0.01


