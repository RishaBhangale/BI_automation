# Dashboard:  spotify_test
# URL:        https://app.powerbi.com/view?r=eyJrIjoiYzNiYmQxYTEtNTFlZS00NDZiLTk1YzQtOWViZDcwZTE1ZTQyIiwidCI6ImI1YWYyNDUxLWUyMWItNGFhMi1iNGI1LWRjNTkwNzkwOGRkOCJ9
# Pages:      1 (single-page report)
#
# Visual layout confirmed from live discovery:
#   • 2 standalone Card visuals: "Average Stream per Year", "Top Song Vs Average"
#   • 1 multi-value Card: "First track_name" (contains sub-KPIs)
#   • 1 multi-value Card: "Sum of acousticness_%" (contains sub-KPIs)
#   • 3 chart visuals: Donut, Stacked bar, Line chart
#
# Validation mode: expected_value (direct YAML comparison, no DB/Excel aggregation)
# is_text: true  → case-insensitive substring match (for text KPIs)
# is_text: false → numeric comparison with tolerance
#
# ⚡ REVIEW CHECKLIST:
#   1. Run: pytest tests/dashboard/test_kpi_validation.py --dashboard-config=<this_file> -s
#   2. Check the HTML report at: reports/html_reports/dashboard_validation_report.html
# ──────────────────────────────────────────────────────────────────────────────

dashboard:
