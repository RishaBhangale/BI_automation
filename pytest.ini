[pytest]
addopts =
    --browser chromium
    --headed
    -v
    --tb=short
markers =
    smoke:      Fast sanity checks — run frequently
    login:      Tests covering login flows
    regression: Full regression suite before release
    dashboard:  BI dashboard validation tests
    api:        Future API tests
    skip_ci:    Tests that should not run in CI

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exclude legacy folders from normal test collection
norecursedirs = _legacy_saucedemo .venv .git __pycache__ .pytest_cache

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)s | %(name)s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S